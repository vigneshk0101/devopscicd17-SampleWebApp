name: Build, Scan & Deploy Docker to EC2 via ECR

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------------------------------------
      # CHECKOUT
      # ---------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------
      # BUILD (Maven)
      # ---------------------------------------------------------
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Build WAR using Maven
        run: mvn -B clean package --file pom.xml

      # ===========================================================
      # SECURITY SCANS
      # ===========================================================

      # TRUFFLEHOG
      - name: Install TruffleHog
        run: pip install trufflehog==2.2.1
        continue-on-error: true

      - name: Run TruffleHog Scan
        run: trufflehog filesystem . --json > trufflehog-results.json || true
        continue-on-error: true

      # SONARCLOUD
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
        continue-on-error: true

      - name: Export Sonar Report Placeholder
        run: echo '{"note": "SonarCloud results stored on dashboard"}' > sonar-report.json
        continue-on-error: true

      # SNYK
      - name: Install Snyk CLI
        uses: snyk/actions/setup@v1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Dependency Scan
        run: snyk test --json --severity-threshold=high > snyk-sca.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      - name: Snyk Code Scan
        run: snyk code test --json --severity-threshold=high > snyk-sast.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # ---------------------------------------------------------
      # DOCKER BUILD
      # ---------------------------------------------------------
      - name: Build Docker Image
        run: docker build -t app:latest .

      - name: Snyk Container Scan
        run: snyk container test app:latest --json --severity-threshold=high > snyk-container.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

      # ===========================================================
      # TRIVY SCANS (Added)
      # ===========================================================

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Trivy Filesystem Scan (Dependencies + IaC)
        run: |
          trivy fs --severity HIGH,CRITICAL --format json -o trivy-fs.json . || true
        continue-on-error: true

      - name: Trivy Container Scan
        run: |
          trivy image --severity HIGH,CRITICAL --format json -o trivy-container.json app:latest || true
        continue-on-error: true

      # ===========================================================
      # OWASP ZAP (DAST)
      # ===========================================================

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://${{ secrets.EC2_HOST }}"
          cmd_options: "-a"
        continue-on-error: true

      - name: Rename ZAP reports
        run: |
          mv report_html.html zap-report.html || true
          mv report_json.json zap-report.json || true
          mv report_md.md zap-report.md || true
        continue-on-error: true

      # ===========================================================
      # AWS LOGIN + PUSH TO ECR
      # ===========================================================

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Push Image to ECR
        run: |
          ECR_URL="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          IMAGE_NAME="${{ secrets.ECR_REPO_NAME }}"
          TAG="latest"

          docker tag app:latest $ECR_URL/$IMAGE_NAME:$TAG
          docker push $ECR_URL/$IMAGE_NAME:$TAG

      # ===========================================================
      # DEPLOY ON EC2
      # ===========================================================

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ECR_URL="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
            IMAGE_NAME="${{ secrets.ECR_REPO_NAME }}"
            TAG="latest"

            sudo docker pull $ECR_URL/$IMAGE_NAME:$TAG
            sudo docker stop app || true
            sudo docker rm app || true
            sudo docker run -d --name app -p 80:8080 $ECR_URL/$IMAGE_NAME:$TAG

      # ===========================================================
      # UPLOAD REPORTS TO S3
      # ===========================================================

      - name: Upload Reports to S3
        run: |
          S3="s3://your-bucket-name/security-scans/run-$GITHUB_RUN_ID/"

          REPORTS=(
            trufflehog-results.json
            snyk-sca.json
            snyk-sast.json
            snyk-container.json
            trivy-fs.json
            trivy-container.json
            sonar-report.json
            zap-report.html
            zap-report.json
            zap-report.md
          )

          for file in "${REPORTS[@]}"; do
            if [ -f "$file" ]; then
              aws s3 cp "$file" "$S3"
            fi
          done
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
